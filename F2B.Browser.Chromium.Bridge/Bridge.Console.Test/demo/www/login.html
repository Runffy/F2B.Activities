<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <style>
    body { font-family: Segoe UI, sans-serif; padding: 12px; margin: 0; font-size: 13px; }
    label { display: block; margin-top: 6px; }
    input, select, textarea { width: 220px; padding: 4px; box-sizing: border-box; }
    fieldset { margin-top: 8px; border: 1px solid #ccc; padding: 8px; }
    legend { font-weight: 600; }
    .row { margin-top: 6px; }
    #statusLabel { margin-top: 10px; color: #333; font-weight: 600; }
    iframe { border: 1px dashed #999; margin-top: 8px; }
  </style>
</head>
<body>
  <h3>GWIS Login</h3>
  <form id="loginForm">
    <label for="userID">User ID</label>
    <input type="text" name="userID" id="userID" autocomplete="username" placeholder="User ID" />

    <label for="password">Password</label>
    <input type="password" name="password" id="password" autocomplete="current-password" />

    <label for="deptSelect">Department</label>
    <select id="deptSelect" name="deptSelect">
      <option value="">-- select --</option>
      <option value="IT">IT</option>
      <option value="OPS">Operations</option>
      <option value="HR">HR</option>
    </select>
    <span id="deptStatus"></span>

    <div class="row">
      <label>
        <input type="checkbox" id="rememberMe" name="rememberMe" />
        Remember me
      </label>
    </div>

    <fieldset>
      <legend>Gender</legend>
      <label><input type="radio" name="gender" id="genderM" value="M" /> Male</label>
      <label><input type="radio" name="gender" id="genderF" value="F" /> Female</label>
    </fieldset>

    <label for="loginNotes">Notes</label>
    <textarea id="loginNotes" name="loginNotes" rows="2" placeholder="Login notes"></textarea>

    <div class="row">
      <button type="button" id="btnLogin">Login</button>
    </div>
  </form>

  <div id="statusLabel">Ready</div>

  <iframe name="InnerPanel" src="inner-panel.html" width="100%" height="72" title="InnerPanel"></iframe>

  <script>
    document.getElementById('btnLogin').addEventListener('click', function () {
      var uid = document.getElementById('userID').value || '';
      document.getElementById('statusLabel').textContent = 'Logged in as: ' + uid;
    });

    document.getElementById('deptSelect').addEventListener('change', function () {
      document.getElementById('deptStatus').textContent = 'dept=' + this.value;
    });
  </script>
</body>
</html>
